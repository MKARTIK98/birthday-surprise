<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Envelope</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f2027;
  font-family:sans-serif;
}

/* Envelope */
.envelope{
  position:relative;
  width:320px;
  height:200px;
  background:#ff8fab;
  border-radius:10px;
  cursor:pointer;
  overflow:hidden; /* hides letter */
}

/* Flap */
.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:#ff4d6d;
  clip-path:polygon(0 0,100% 0,50% 50%);
  transform-origin:top;
  transition:transform 0.6s ease;
  z-index:3;
}

/* Letter INSIDE */
.letter{
  position:absolute;
  width:90%;
  left:5%;
  top:100%; /* start at bottom edge */
  transform:translateY(0); /* hidden */
  
  background:white;
  padding:15px;
  border-radius:8px;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);

  transition:transform 1s ease;
  z-index:1;
}

/* OPEN */
.open .flap{
  transform:rotateX(180deg);
}

.open .letter{
  transform:translateY(-120%); /* move UP out of envelope */
}

/* Text */
h2{margin:0;color:#ff4d6d}
p{font-size:14px;color:#333}
</style>
</head>

<body>

<div class="envelope" id="env" onclick="openEnvelope()">
  <div class="flap"></div>

  <div class="letter">
    <h2>Happy Birthday Chandni 🌙</h2>
    <p>
      I know I was unable to make it to Goa and celebrate your birthday.<br><br>
      But I just wanted to create this for you...<br><br>
      You mean so much to me ❤️
    </p>
  </div>
</div>

<script>
function openEnvelope(){
  document.getElementById('env').classList.toggle('open');
}
</script>

</body>
</html>
