<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Envelope</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f2027;
  font-family:sans-serif;
}

/* Wrapper (IMPORTANT: controls clipping) */
.wrapper{
  position:relative;
  width:320px;
  height:200px;
}

/* Envelope */
.envelope{
  position:absolute;
  width:100%;
  height:100%;
  background:#ff8fab;
  border-radius:10px;
  cursor:pointer;
  overflow:hidden; /* hides letter initially */
}

/* Flap */
.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:#ff4d6d;
  clip-path:polygon(0 0,100% 0,50% 50%);
  transform-origin:top;
  transition:transform 0.6s ease;
  z-index:3;
}

/* Letter */
.letter{
  position:absolute;
  width:90%;
  left:5%;
  top:100%; /* starts below envelope */

  background:white;
  padding:15px;
  border-radius:8px;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);

  transition:top 1s ease;
  z-index:1;
}

/* OPEN STATE */
.open .flap{
  transform:rotateX(180deg);
}

.open .letter{
  top:-40px; /* comes out and stays readable */
}

/* Text */
h2{margin:0;color:#ff4d6d}
p{font-size:14px;color:#333;line-height:1.5}
</style>
</head>

<body>

<div class="wrapper" id="env">
  <div class="envelope">
    <div class="flap"></div>
  </div>

  <div class="letter">
    <h2>Happy Birthday Chandni 🌙</h2>
    <p>
      I know I was unable to make it to Goa and celebrate your birthday.<br><br>
      But I just wanted to create this for you... to remind you how special you are to me.<br><br>
      Even though I couldn't be there, my thoughts are with you today.<br><br>
      You mean so much to me ❤️
    </p>
  </div>
</div>

<script>
const env = document.getElementById('env');

env.addEventListener('click', () => {
  env.classList.add('open');
});
</script>

</body>
</html>
