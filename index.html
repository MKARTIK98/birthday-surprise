<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Chandni ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
  font-family:'Poppins',sans-serif;
  color:white;
  overflow-y:auto;
  padding:40px 10px;
}

/* Overlay */
.overlay{
  position:fixed;
  inset:0;
  background:#000000cc;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
  font-size:18px;
  text-align:center;
  cursor:pointer;
}

/* Container */
.container{
  text-align:center;
  max-width:500px;
  padding:20px;
  margin:auto;
}

/* Title with glow */
h1{
  font-family:'Playfair Display',serif;
  font-size:32px;
  margin-bottom:20px;
  text-shadow:0 0 10px rgba(255,255,255,0.6);
}

/* Message */
.message{
  font-size:15px;
  line-height:1.7;
  white-space:pre-line;
  min-height:150px;
}

/* Cursor */
.cursor{
  display:inline-block;
  width:2px;
  background:white;
  margin-left:4px;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%,50%,100%{opacity:1;}
  25%,75%{opacity:0;}
}

/* Continue hint */
.continue{
  margin-top:20px;
  font-size:13px;
  opacity:0.7;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%,100%{opacity:0.4;}
  50%{opacity:1;}
}

/* Signature */
.signature{
  margin-top:25px;
  font-style:italic;
  opacity:0;
  transition:opacity 1.5s ease;
}

/* Hearts */
.hearts span{
  position:absolute;
  bottom:-20px;
  font-size:18px;
  animation:float 6s linear infinite;
  color:#ff6b81;
  pointer-events:none;
}

@keyframes float{
  0%{transform:translateY(0);opacity:0}
  50%{opacity:1}
  100%{transform:translateY(-120vh);opacity:0}
}
</style>
</head>

<body>

<div class="overlay" id="overlay">Tap anywhere to begin ❤️</div>

<div class="hearts" id="hearts"></div>

<div class="container" id="container" style="display:none;">
  <h1>Happy Birthday Chandni 🌙 🎉 🎂</h1>

  <div class="message" id="typedText"></div>
  <div class="continue" id="continueHint" style="display:none;">Tap to continue...</div>

  <div class="signature" id="signature">
    Meri Preethi ko Happy Birthday phirse 🎂💕<br><br>
    Aapka,<br>
    <b>Kartik ❤️</b>
  </div>
</div>

<audio id="music" loop>
  <source src="Maula%20Mere%20Maula%20_%20Updated.mp3" type="audio/mp3">
</audio>

<script>
const sections = [
`I know I was unable to make it to Goa to celebrate your birthday. Full scenes miss krdiya mne.`,
  
`Jo hua uska kuch nahi kr sakte, agar me hota waha toh maybe things wuldve gone differently.`,

`I wont miss this opportunity to say this`,

`I TOLD YOU SO 😂.`,

`Jokes aside`,

`I just wanted to create this chota sa wishes wala site to tell you how much I miss you.`,

`Bahut yaad aari hai aapki. I know this is not the kind of gift you were expecting, but mil nahi paunga bday ke time, so iss baar ke liye isse adjust krlo 🤭`,

`You mean so much to me, and I wish I could see your beautiful smile in person.`,

`Gaana yaad hai ye wala!!?? Sunta hu to apki yaad aati hai 😊`,

`Everything is going to be alright...sab kuch thik hoga ❤️`,

`Ab jaao bacha hua bday enjoy karo, god bless you.`
];

let currentSection = 0;
let i = 0;
const speed = 30;
const target = document.getElementById("typedText");

function typeSection(){
  const text = sections[currentSection];
  if(i < text.length){
    target.innerHTML = text.substring(0, i+1) + '<span class="cursor"></span>';
    i++;
    setTimeout(typeSection, speed);
  } else {
    target.innerHTML = text;
    document.getElementById("continueHint").style.display = "block";
  }
}

function nextSection(){
  if(currentSection < sections.length - 1){
    currentSection++;
    i = 0;
    target.innerHTML = "";
    document.getElementById("continueHint").style.display = "none";
    setTimeout(typeSection, 300);
  } else {
    document.getElementById("continueHint").style.display = "none";
    document.getElementById("signature").style.opacity = 1;
  }
}

/* Start experience */
document.getElementById("overlay").onclick = () => {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("container").style.display = "block";
  playMusic();
  typeSection();
};

/* Tap to continue */
document.body.addEventListener("click", (e)=>{
  if(e.target.id !== "overlay" && document.getElementById("continueHint").style.display === "block"){
    nextSection();
  }
});

/* Music */
function playMusic(){
  const music = document.getElementById('music');
  music.volume = 0;
  music.play().catch(()=>{});

  let vol = 0;
  const fade = setInterval(()=>{
    if(vol < 0.4){
      vol += 0.02;
      music.volume = vol;
    } else clearInterval(fade);
  },100);
}

/* Hearts */
setInterval(()=>{
  let h = document.createElement('span');
  h.innerHTML = '❤';
  h.style.left = Math.random()*100 + '%';
  h.style.fontSize = (Math.random()*10 + 12) + 'px';
  document.getElementById('hearts').appendChild(h);
  setTimeout(()=>h.remove(),6000);
},400);
</script>

</body>
</html>
