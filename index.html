<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Chandni ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
  font-family:'Poppins',sans-serif;
  color:white;
  overflow-y:auto;
  padding:40px 10px;
}

/* Container */
.container{
  text-align:center;
  max-width:500px;
  padding:20px;
  margin:auto;
  animation:fadeIn 2s ease;
}

/* Title */
h1{
  font-family:'Playfair Display',serif;
  font-size:32px;
  margin-bottom:20px;
}

/* Message */
.message{
  font-size:15px;
  line-height:1.7;
  white-space:pre-line;
  min-height:200px;
}

/* Cursor */
.cursor{
  display:inline-block;
  width:2px;
  background:white;
  margin-left:4px;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%,50%,100%{opacity:1;}
  25%,75%{opacity:0;}
}

/* Signature */
.signature{
  margin-top:25px;
  font-style:italic;
  opacity:0;
  transition:opacity 1s ease;
}

/* Floating hearts */
.hearts span{
  position:absolute;
  bottom:-20px;
  font-size:18px;
  animation:float 6s linear infinite;
  color:#ff6b81;
  pointer-events:none;
}

@keyframes float{
  0%{transform:translateY(0);opacity:0}
  50%{opacity:1}
  100%{transform:translateY(-120vh);opacity:0}
}

/* Animations */
@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="container" onclick="playMusic()">
  <h1>Happy Birthday Chandni 🌙</h1>

  <div class="message" id="typedText"></div>

  <div class="signature" id="signature">
    Meri Preethi ko Happy Birthday phirse 🎂💕<br><br>
    Aapka,<br>
    <b>Kartik ❤️</b>
  </div>
</div>

<audio id="music" loop>
  <source src="Maula%20Mere%20Maula%20_%20Updated.mp3" type="audio/mp3">
</audio>

<script>
const text = `I was unable to make it to Goa to celebrate your birthday. Full party miss krdiya mne.

But I just wanted to create this small surprise to tell you how much I miss you.

Bahut yaad aari hai aapki. I know this is not the kind of gift you were expecting, but mil nahi paunga bday ke time, so iss baar ke liye ye 🤭.

You mean so much to me, and I wish I could see your beautiful smile in person.

Kahi pe bhi tap karo ek baar screen pe.

Gaana yaad hai ye wala!!?? Sunta hu to apki yaad aati hai 😊

Everything is going to be alright...everything ❤️`;

let i = 0;
const speed = 35;
const target = document.getElementById("typedText");

function typeWriter(){
  if(i < text.length){
    target.innerHTML = text.substring(0, i+1) + '<span class="cursor"></span>';
    i++;
    setTimeout(typeWriter, speed);
  } else {
    target.innerHTML = text; // remove cursor at end
    document.getElementById("signature").style.opacity = 1;
  }
}

typeWriter();

/* Music */
function playMusic(){
  const music = document.getElementById('music');
  music.volume = 0;

  music.play().catch(()=>{});

  let vol = 0;
  const fade = setInterval(()=>{
    if(vol < 0.4){
      vol += 0.02;
      music.volume = vol;
    } else clearInterval(fade);
  },100);
}

/* floating hearts */
setInterval(()=>{
  let h = document.createElement('span');
  h.innerHTML = '❤';
  h.style.left = Math.random()*100 + '%';
  h.style.fontSize = (Math.random()*10 + 12) + 'px';
  document.getElementById('hearts').appendChild(h);
  setTimeout(()=>h.remove(),6000);
},400);
</script>

</body>
</html>
