<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Chandni 🌙</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #1a1a2e, #0f3460);
  overflow: hidden;
  color: white;
}

/* Stars */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: transparent;
  overflow: hidden;
}
.stars span {
  position: absolute;
  display: block;
  width: 2px;
  height: 2px;
  background: white;
  animation: twinkle 3s infinite ease-in-out;
}
@keyframes twinkle {
  0%,100%{opacity:0.2}
  50%{opacity:1}
}

.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
}

.envelope {
  width: 320px;
  height: 200px;
  position: relative;
  cursor: pointer;
}

.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #ff4d6d;
  clip-path: polygon(0 0, 100% 0, 50% 50%);
  transform-origin: top;
  transition: transform 1s;
}

.body {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #ff8fab;
  border-radius: 6px;
}

.letter {
  position: absolute;
  width: 90%;
  height: 90%;
  background: #fff;
  color: #333;
  top: 5%;
  left: 5%;
  border-radius: 10px;
  padding: 15px;
  transform: translateY(100%);
  transition: transform 1s;
  overflow-y: auto;
}

.open .flap { transform: rotateX(180deg); }
.open .letter { transform: translateY(0); }

h1 {
  font-family: 'Dancing Script', cursive;
  color: #ff4d6d;
}

.typing {
  border-right: 2px solid #ff4d6d;
  white-space: pre-line;
  overflow: hidden;
}

.hearts span {
  position: absolute;
  color: #ff4d6d;
  font-size: 18px;
  animation: float 6s linear infinite;
}
@keyframes float {
  0%{transform:translateY(100vh);opacity:0}
  50%{opacity:1}
  100%{transform:translateY(-10vh);opacity:0}
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}

@media(max-width:600px){
  .envelope{width:90%}
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="hearts" id="hearts"></div>

<div class="container">
  <div class="envelope" onclick="openEnvelope()" id="env">
    <div class="flap"></div>
    <div class="body"></div>
    <div class="letter">
      <h1>Happy Birthday Chandni 🌙</h1>
      <p id="text" class="typing"></p>
    </div>
  </div>
  <button onclick="playMusic()">Play Music 🎵</button>
</div>

<audio id="music" loop>
  <source src="Maula%20Mere%20Maula%20_%20Updated.mp3" type="audio/mp3">
</audio>

<script>
const message = `I know I was unable to make it to Goa and celebrate your birthday.\n\nBut I just wanted to create this to tell you how much I miss you.\n\nEven though I couldn't be there, my thoughts are with you.\n\nYou mean so much to me, and I wish I could see your smile.\n\nEverything is going to be alright. ❤️\n\nMeri Preethi ko Happy Birthday phirse 🎂💕\n\nMissing you so much,\nAlways yours,\nKartik ❤️`;

let i=0;
function typeWriter(){
  if(i<message.length){
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter,30);
  }
}

function openEnvelope(){
  document.getElementById('env').classList.toggle('open');
  setTimeout(()=>{
    if(i===0) typeWriter();
    playMusic();
  },800);
}

function playMusic(){
  document.getElementById('music').play();
}

/* stars */
for(let i=0;i<60;i++){
  let star=document.createElement('span');
  star.style.top=Math.random()*100+'%';
  star.style.left=Math.random()*100+'%';
  star.style.animationDelay=Math.random()*3+'s';
  document.getElementById('stars').appendChild(star);
}

/* hearts */
setInterval(()=>{
  let heart=document.createElement('span');
  heart.innerHTML='❤';
  heart.style.left=Math.random()*100+'%';
  heart.style.fontSize=(Math.random()*10+10)+'px';
  document.getElementById('hearts').appendChild(heart);
  setTimeout(()=>heart.remove(),6000);
},500);
</script>

</body>
</html>
